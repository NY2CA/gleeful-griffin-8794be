# Netlify configuration for Multifamily Mastery platform.
# This file MUST live at the repo root (or at the Base directory set in the
# Netlify UI). If Netlify's UI has Publish directory set to anything,
# CLEAR IT in Site configuration → Build & deploy → Build settings.

[build]
  # Where npm/pnpm/yarn runs. Leave empty if this toml is already inside
  # the project root. Set to "multifamily-platform" if this toml is in a
  # subdirectory.
  base    = ""
  command = "npm run build"
  # Next.js output directory. @netlify/plugin-nextjs consumes this.
  publish = ".next"

[build.environment]
  NODE_VERSION    = "20"
  NPM_FLAGS       = "--legacy-peer-deps"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Functions v2 (see netlify/functions/*.ts) register their own routes via
# `export const config = { path: '/api/...' }`. No manual redirects needed.
[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# The Stripe webhook endpoint must receive the raw request body so the
# signature can be verified. Disable any body mutation on that route.
[functions."billing-webhook"]
  # No transform — Functions v2 already delivers Request with an untouched body.
  included_files = []

# Daily drip cron. The actual cron expression is set inside the function
# file via `export const config = { schedule: '0 13 * * *' }` (9am ET).
# This stanza is here only to surface the intent in repo configuration; if
# you want to override the schedule at the toml layer, uncomment the line.
[functions."scheduled-drip"]
  # schedule = "0 13 * * *"
  included_files = []

# Classic fallback — only uncomment if Functions v2 route registration fails
# for some reason:
# [[redirects]]
#   from   = "/api/*"
#   to     = "/.netlify/functions/:splat"
#   status = 200
